apiVersion : autoscaling/v2
kind: HorizontalPodAutoscaler
metadata :
  name : hpa-resource-metrics-memory
  namespace : default
spec :
  scaleTargetRef :
    apiVersion : apps/v1
    kind : Deployment
    name : mcp-deploy
  minReplicas : 4
  maxReplicas : 20
  metrics :
  - type : Resource
    resource :
      name : memory
      target:
        type : Utilization
        averageUtilization : 50
  behavior :
    scaleDown :
      stabilizationWindowSeconds : 300
      policies :
      - type : Pods
        value : 1
        periodSeconds : 300

